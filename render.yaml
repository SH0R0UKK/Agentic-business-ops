services:
  - type: web
    name: agentic-business-ops-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
